name: Android Build and Release

on:
  push:
    branches: [ "main" ] # تشغيل عند رفع أي تغييرات إلى فرع main

jobs:
  build:
    runs-on: ubuntu-latest # استخدام خادم Linux سحابي

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # سحب الكود

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew # التأكد من إذن التنفيذ

    - name: Run Gradle Build
      run: ./android/gradlew assembleDebug # أمر التجميع الفعلي

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk # مسار ملف APK الناتج
